name: Schedule and Dispatch Lab

on:
  #schedule:
  #  - cron: "5 * * * *" # every 5 minutes
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to test"
        required: true
        default: "staging"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Running tests on ${{ github.event.inputs.env || 'nightly run' }}"
